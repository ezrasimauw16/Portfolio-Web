<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portraits | Ezra's Web</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Playfair+Display:ital,wght@1,700&family=Righteous&display=swap" rel="stylesheet">
    
    <script defer src="script.js"></script>
    <style>
        

        .back-link {
            display: inline-block;
            color: var(--text-sub);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: 40px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Gallery Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 80px;
        }

        .photo-item {
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: var(--glass-bg);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        .photo-item:hover img {
            transform: scale(1.08);
        }

        /* --- LIGHTBOX (MODAL) STYLES --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            backdrop-filter: blur(10px);
            overflow: auto;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 85vh;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            animation: zoomIn 0.3s ease;
            object-fit: contain;
        }

        #caption {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            text-align: center;
            color: var(--accent);
            padding: 15px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {transform: scale(0.9); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
        @keyframes slideInRight {
            from { transform: translateX(80px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes slideInLeft {
            from { transform: translateX(-80px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }
        @keyframes slideOutLeft {
            from { transform: translateX(0);     opacity: 1; }
            to   { transform: translateX(-80px); opacity: 0; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0);    opacity: 1; }
            to   { transform: translateX(80px); opacity: 0; }
        }

            to   { transform: translateX(0);    opacity: 1; }
        }

            to   { transform: translateX(0);     opacity: 1; }
        }

            to   { transform: translateX(-80px); opacity: 0; }
        }

            to   { transform: translateX(80px); opacity: 0; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--text-main);
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
        }

        .close-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* SLIDER ARROWS */
        .prev-btn, .next-btn {
            cursor: pointer;
            position: absolute;
            top: 50%;
            padding: 20px;
            margin-top: -50px;
            color: var(--text-sub);
            font-weight: bold;
            font-size: 40px;
            transition: 0.3s ease;
            user-select: none;
            z-index: 1002;
        }

        .next-btn { right: 20px; }
        .prev-btn { left: 20px; }

        .prev-btn:hover, .next-btn:hover {
            color: var(--accent);
            transform: scale(1.2);
        }

        /* Override global h1 gradient — use solid accent color instead */
        h1 {
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: var(--accent);
            color: var(--accent);
            filter: none;
        }
    </style>
    <script>
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    </script>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="gallery.html" class="active">GALLERY</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        </nav>  

    <main class="container">
        
        <a href="gallery.html" class="back-link css-fade delay-1">&larr; BACK TO ALBUMS</a>

        <div style="margin-top: 20px; margin-bottom: 40px;" class="css-fade delay-1">
            <h1 style="font-family: 'Righteous', cursive; font-size: 3.5rem; margin-bottom: 10px; color: var(--accent);">Portraits</h1>
            <p style="color: var(--text-sub); font-size: 1.1rem; max-width: 600px;">
                Exploring the human element through different environments and moods. A personal collection of lifestyle photography, candid moments, and creative expressions.
            </p>
        </div>

        <div class="photo-grid css-fade delay-2">
            <div class="photo-item"><img src="Portrait/Ezra1.jpg" alt="THICF"></div>
            <div class="photo-item"><img src="Portrait/Ezra2.jpg" alt="THICF Baliho"></div>
            <div class="photo-item"><img src="Portrait/Ezra3.jpg" alt="THICF Candid"></div>
            <div class="photo-item"><img src="Portrait/Ezra4.jpg" alt="Admiring Waterfall"></div>
            <div class="photo-item"><img src="Portrait/Ezra5.jpeg" alt="Golden Hour"></div>
            <div class="photo-item"><img src="Portrait/Ezra6.jpeg" alt="Jesus Blessing View"></div>
            <div class="photo-item"><img src="Portrait/Ezra7.jpeg" alt="Cliffs"></div>
        </div>

    </main>

    <div id="image-modal" class="modal">
        <span class="close-btn">&times;</span>
        <span class="prev-btn">&#10094;</span>
        <span class="next-btn">&#10095;</span>
        
        <img class="modal-content" id="full-image">
        <div id="caption"></div>
    </div>
    
    <footer style="text-align: center; padding: 30px; opacity: 0.7; font-size: 0.9rem; margin-top: 50px;">
        &copy; 2026 Ezra Steve Simauw | Informatics Student, Designer &amp; Photographer
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById("image-modal");
            const modalImg = document.getElementById("full-image");
            const captionText = document.getElementById("caption");
            const closeBtn = document.querySelector(".close-btn");
            const prevBtn = document.querySelector(".prev-btn");
            const nextBtn = document.querySelector(".next-btn");
            
            const images = document.querySelectorAll(".photo-item img");
            let currentIndex = 0; 

            function showImage(index, direction) {
                // direction: 'next' slides left, 'prev' slides right, undefined = open (zoom)
                if (direction === undefined) {
                    modalImg.src = images[index].src;
                    captionText.innerHTML = images[index].alt;
                    modalImg.style.animation = 'zoomIn 0.3s ease';
                    captionText.style.animation = 'zoomIn 0.3s ease';
                    currentIndex = index;
                    return;
                }

                const outAnim = direction === 'next' ? 'slideOutLeft 0.25s ease forwards' : 'slideOutRight 0.25s ease forwards';
                const inAnim  = direction === 'next' ? 'slideInRight 0.3s ease forwards'  : 'slideInLeft 0.3s ease forwards';

                modalImg.style.animation = outAnim;
                captionText.style.animation = 'none';
                captionText.style.opacity = '0';

                setTimeout(() => {
                    modalImg.src = images[index].src;
                    captionText.innerHTML = images[index].alt;
                    currentIndex = index;
                    modalImg.style.animation = inAnim;
                    captionText.style.animation = 'zoomIn 0.3s ease';
                    captionText.style.opacity = '1';
                }, 250);
            }

            images.forEach((img, index) => {
                img.addEventListener("click", function() {
                    modal.style.display = "block";
                    showImage(index, undefined);
                });
            });

            nextBtn.addEventListener("click", function() {
                let nextIndex = (currentIndex + 1) % images.length;
                showImage(nextIndex, 'next');
            });

            prevBtn.addEventListener("click", function() {
                let prevIndex = (currentIndex - 1 + images.length) % images.length;
                showImage(prevIndex, 'prev');
            });

            closeBtn.addEventListener("click", function() {
                modal.style.display = "none";
            });

            modal.addEventListener("click", function(e) {
                if (e.target === modal) {
                    modal.style.display = "none";
                }
            });

            document.addEventListener("keydown", function(e) {
                if (modal.style.display === "block") {
                    if (e.key === "ArrowRight") nextBtn.click();
                    if (e.key === "ArrowLeft") prevBtn.click();
                    if (e.key === "Escape") closeBtn.click();
                }
            });
        });
    </script>


    <button id="back-to-top" title="Back to top">&#8679;</button>
</body>
</html>
